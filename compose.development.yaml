services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dependencies

    container_name: notification-preference-service-development
    restart: unless-stopped

    env_file:
      - .env.development

    command: npm run dev

    ports:
      - "${APP_PORT:-3000}:3000"

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-bookworm
    container_name: notification-preference-postgres-development
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres-development-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}

      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-development-data:
